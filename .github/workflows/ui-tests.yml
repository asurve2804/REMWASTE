# .github/workflows/ui-tests.yml
name: UI Tests with Coverage

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      ##########################
      # Frontend Start + Cypress UI Test
      ##########################

      - name: Setup frontend
        working-directory: react_app/react-login-crud-demo
        run: npm ci

      - name: Start React app
        working-directory: react_app/react-login-crud-demo
        run: npm start

      - name: Run Cypress tests
        working-directory: .
        run: npm ci && npx cypress run
